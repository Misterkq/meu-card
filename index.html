<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!--AUDIO-->

    <div class="container-pai">

            <img src="perfil.webp" alt="foto ">

            <!-- 3. INFORMAÇÕES PESSOAIS (Texto Simples) -->

                    <li>-hello Kitty 🐱</li>

            <!-- 4. TAGS / BOTÕES DE PERSONALIZAÇÃO -->

                <span class="tag">🎨 Designer</span>

                    <!-- Coloque a tag <img> do ícone do Insta aqui se tiver -->
                     <img src="https://zyo.se/assets/images/socials/rd0Vr.png" alt="tiktok">
                    <span class="copyable">Mister_kq653</span>
        
                    
                </div>

                <!-- Item 2: Discord -->
                <div class="social-item">
                    <img src="https://zyo.se/assets/images/socials/RrwfY.png" alt="discord">
                    <span class="copyable">.Kaiqueoliveira</span>
                </div>
        </div>

    <script src="index.js"></script>
</div>
